<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Forge — Lanceur de dés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0b07;
      --surface:   #1a1510;
      --surface2:  #241e15;
      --gold:      #c9942a;
      --gold-lt:   #f0c060;
      --gold-dk:   #7a5515;
      --ember:     #e85d20;
      --ivory:     #f2e8d5;
      --ivory-dim: #a89880;
      --held:      #0f2018;
      --held-brd:  #3a8050;
      --held-glow: rgba(58,128,80,0.45);
      --shadow:    rgba(0,0,0,0.7);
      --glow:      rgba(201,148,42,0.35);
      --r:         12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ivory);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,148,42,0.08) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 2px,
          rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2.5rem 1rem 1rem;
    }

    header h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-dk) 0%, var(--gold) 40%, var(--gold-lt) 60%, var(--gold) 80%, var(--gold-dk) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
      line-height: 1.1;
      filter: drop-shadow(0 0 20px var(--glow));
    }

    .subtitle {
      font-size: 1rem;
      color: var(--ivory-dim);
      font-style: italic;
      margin-top: 0.4rem;
      letter-spacing: 0.15em;
      font-weight: 300;
    }

    .divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.2rem auto 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      padding: 1.5rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-dk);
      border-radius: var(--r);
      padding: 1.5rem;
      box-shadow: 0 4px 32px var(--shadow), inset 0 1px 0 rgba(201,148,42,0.1);
    }

    .card-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    /* ── Die type buttons ── */
    .die-types { display: flex; flex-wrap: wrap; gap: 0.6rem; }

    .die-btn {
      flex: 1; min-width: 60px; max-width: 90px;
      aspect-ratio: 1;
      background: var(--surface2);
      border: 1.5px solid var(--gold-dk);
      border-radius: 10px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      transition: all 0.18s ease;
      position: relative; overflow: hidden;
    }

    .die-btn::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,148,42,0.15), transparent 70%);
      opacity: 0; transition: opacity 0.2s;
    }

    .die-btn:hover::before, .die-btn.active::before { opacity: 1; }

    .die-btn:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,148,42,0.2); }
    .die-btn.active { border-color: var(--gold-lt); background: #2a2015; box-shadow: 0 0 20px rgba(201,148,42,0.3), inset 0 1px 0 rgba(240,192,96,0.2); }

    .die-icon  { font-size: 1.4rem; line-height: 1; }
    .die-label { font-family: 'Cinzel Decorative', serif; font-size: 0.65rem; color: var(--gold); letter-spacing: 0.05em; }

    /* ── Count controls ── */
    .count-row { display: flex; align-items: center; gap: 1rem; }
    .count-label { font-size: 1rem; color: var(--ivory-dim); flex: 1; }
    .count-controls { display: flex; align-items: center; gap: 0.5rem; }

    .count-btn {
      width: 36px; height: 36px;
      background: var(--surface2); border: 1px solid var(--gold-dk); border-radius: 8px;
      color: var(--gold); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; user-select: none;
    }

    .count-btn:hover { background: #2a2015; border-color: var(--gold); box-shadow: 0 0 12px rgba(201,148,42,0.25); }
    .count-btn:active { transform: scale(0.92); }

    .count-display {
      font-family: 'Cinzel Decorative', serif; font-size: 1.6rem;
      color: var(--gold-lt); min-width: 2.5rem; text-align: center; line-height: 1;
    }

    .presets { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem; }

    .preset-btn {
      padding: 0.25rem 0.7rem;
      background: transparent; border: 1px solid var(--gold-dk); border-radius: 20px;
      color: var(--ivory-dim); font-family: 'Crimson Pro', serif; font-size: 0.88rem;
      cursor: pointer; transition: all 0.15s;
    }

    .preset-btn:hover { border-color: var(--gold); color: var(--gold-lt); }

    /* ── Roll button ── */
    .roll-btn {
      width: 100%; padding: 1rem 2rem;
      background: linear-gradient(135deg, #7a5515 0%, var(--gold) 50%, #7a5515 100%);
      background-size: 200% 100%;
      border: none; border-radius: var(--r);
      color: var(--bg);
      font-family: 'Cinzel Decorative', serif; font-size: 1.1rem;
      font-weight: 700; letter-spacing: 0.12em;
      cursor: pointer; position: relative; overflow: hidden;
      transition: background-position 0.4s, transform 0.1s, box-shadow 0.3s;
      box-shadow: 0 4px 20px rgba(201,148,42,0.25);
    }

    .roll-btn::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.2), transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }

    .roll-btn:hover { background-position: 100% 0; box-shadow: 0 8px 32px rgba(201,148,42,0.5); }
    .roll-btn:hover::after { opacity: 1; }
    .roll-btn:active { transform: scale(0.97); }
    .roll-btn.rolling { pointer-events: none; animation: rollPulse 0.6s ease; }

    .btn-held-badge {
      display: inline-block;
      background: rgba(0,0,0,0.25); border-radius: 10px;
      padding: 0 0.45em; font-size: 0.82em; margin-left: 0.45em;
    }

    @keyframes rollPulse {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.95); }
      60%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    /* ── Results card ── */
    .results-card { min-height: 180px; display: flex; flex-direction: column; }

    .results-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 0.6rem; gap: 0.5rem;
    }

    .results-left { display: flex; flex-direction: column; gap: 0.4rem; }

    .results-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .action-btn {
      background: transparent; border: 1px solid var(--gold-dk); border-radius: 6px;
      color: var(--ivory-dim); font-family: 'Crimson Pro', serif; font-size: 0.8rem;
      padding: 0.22rem 0.55rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }

    .action-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
    .action-btn.release:hover { border-color: var(--ember); color: var(--ember); }

    .total-display { text-align: right; flex-shrink: 0; }
    .total-label   { font-size: 0.75rem; color: var(--ivory-dim); font-style: italic; }
    .total-value   {
      font-family: 'Cinzel Decorative', serif; font-size: 2.4rem;
      color: var(--gold-lt); line-height: 1;
      filter: drop-shadow(0 0 8px var(--glow));
    }

    .total-value.new-roll { animation: totalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes totalPop {
      0%   { transform: scale(0.7); opacity: 0.5; }
      100% { transform: scale(1);   opacity: 1;   }
    }

    /* ── Hold hint ── */
    .hold-hint {
      font-size: 0.82rem; color: var(--ivory-dim);
      font-style: italic; padding: 0.3rem 0 0.7rem;
      opacity: 0.75; letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .hold-hint.has-held { color: #7ee8a2; opacity: 1; }

    /* ── Dice grid ── */
    .dice-grid {
      display: flex; flex-wrap: wrap;
      gap: 0.7rem; flex: 1; align-content: flex-start;
    }

    /* Individual die */
    .die-result {
      width: 64px; height: 64px;
      background: var(--surface2);
      border: 1.5px solid var(--gold-dk);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      user-select: none; -webkit-tap-highlight-color: transparent;
      opacity: 0; transform: scale(0.5) rotate(-15deg);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .die-result .die-val {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.3rem; line-height: 1; pointer-events: none;
    }

    .die-result .lock-icon {
      position: absolute; top: 3px; right: 5px;
      font-size: 0.65rem; opacity: 0;
      transition: opacity 0.15s; pointer-events: none;
    }

    /* Value states */
    .die-result.is-max { border-color: var(--gold-lt); background: #2a2015; box-shadow: 0 0 12px rgba(201,148,42,0.4); }
    .die-result.is-max .die-val { color: var(--gold-lt); }
    .die-result.is-min { border-color: var(--ember); }
    .die-result.is-min .die-val { color: var(--ember); }

    /* HELD state */
    .die-result.held {
      background: var(--held) !important;
      border-color: var(--held-brd) !important;
      box-shadow: 0 0 16px var(--held-glow), inset 0 1px 0 rgba(90,191,128,0.12) !important;
    }

    .die-result.held .die-val { color: #7ee8a2 !important; }
    .die-result.held .lock-icon { opacity: 1; color: #5abf80; }

    /* Hover effects */
    .die-result:not(.held):hover {
      border-color: var(--held-brd);
      box-shadow: 0 0 12px rgba(58,128,80,0.3);
    }

    .die-result.held:hover {
      border-color: #7ee8a2;
      box-shadow: 0 0 20px rgba(90,191,128,0.6), inset 0 1px 0 rgba(90,191,128,0.2);
    }

    /* Animations */
    .die-result.reveal {
      opacity: 1; transform: scale(1) rotate(0deg);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .die-result.just-held { animation: wiggleHold 0.32s ease; }

    @keyframes wiggleHold {
      0%   { transform: scale(1)    rotate(0deg); }
      25%  { transform: scale(1.12) rotate(-7deg); }
      60%  { transform: scale(1.05) rotate(4deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--ivory-dim); font-style: italic; font-size: 1.05rem; opacity: 0.5;
    }

    /* ── Stats ── */
    .stats-row { display: flex; gap: 0.5rem; }

    .stat-chip {
      flex: 1; background: var(--surface2); border: 1px solid var(--gold-dk);
      border-radius: 8px; padding: 0.5rem 0.4rem; text-align: center;
    }

    .stat-chip .val { display: block; font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--gold); }
    .stat-chip .lbl { display: block; font-size: 0.7rem; color: var(--ivory-dim); font-style: italic; }

    /* ── History ── */
    .history-list {
      display: flex; flex-direction: column; gap: 0.5rem;
      max-height: 200px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--gold-dk) transparent;
    }

    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0.8rem;
      background: var(--surface2); border-radius: 8px;
      border-left: 2px solid var(--gold-dk);
      font-size: 0.9rem; animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .history-desc  { color: var(--ivory-dim); }
    .history-total { font-family: 'Cinzel Decorative', serif; color: var(--gold); }

    .held-badge {
      display: inline-block;
      font-size: 0.68rem; color: #5abf80;
      background: var(--held); border-radius: 4px;
      padding: 0 0.3em; margin-left: 0.3em;
    }

    .clear-btn {
      background: transparent; border: 1px solid var(--gold-dk); border-radius: 6px;
      color: var(--ivory-dim); font-family: 'Crimson Pro', serif; font-size: 0.8rem;
      padding: 0.2rem 0.6rem; cursor: pointer; transition: all 0.15s;
    }

    .clear-btn:hover { border-color: var(--ember); color: var(--ember); }

    /* ── Particle FX ── */
    .particle {
      position: fixed; pointer-events: none;
      font-family: 'Cinzel Decorative', serif; font-size: 1.2rem;
      color: var(--gold); z-index: 100;
      animation: particleFly 0.9s ease-out forwards;
    }

    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--dr)); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .die-btn    { min-width: 52px; max-width: 72px; }
      .die-icon   { font-size: 1.2rem; }
      .die-result { width: 54px; height: 54px; }
      .die-result .die-val { font-size: 1.1rem; }
      .total-value { font-size: 1.9rem; }
      .stats-row  { flex-wrap: wrap; }
      .stat-chip  { min-width: calc(50% - 0.25rem); }
      .results-actions { gap: 0.3rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Dice Forge</h1>
  <p class="subtitle">Forgez votre destin, lancez les dés</p>
  <div class="divider"></div>
</header>

<main>

  <!-- TYPE DE DÉ -->
  <div class="card">
    <div class="card-title">⚔ Type de dé</div>
    <div class="die-types" id="dieTypes"></div>
  </div>

  <!-- NOMBRE DE DÉS -->
  <div class="card">
    <div class="card-title">⚡ Nombre de dés</div>
    <div class="count-row">
      <span class="count-label">Combien de dés lancer ?</span>
      <div class="count-controls">
        <button class="count-btn" id="decBtn">−</button>
        <span class="count-display" id="countDisplay">5</span>
        <button class="count-btn" id="incBtn">+</button>
      </div>
    </div>
    <div class="presets">
      <span style="color:var(--ivory-dim);font-size:0.85rem;font-style:italic;line-height:2;">Rapide :</span>
      <button class="preset-btn" data-n="1">1</button>
      <button class="preset-btn" data-n="2">2</button>
      <button class="preset-btn" data-n="3">3</button>
      <button class="preset-btn" data-n="4">4</button>
      <button class="preset-btn" data-n="5">5 🎲</button>
      <button class="preset-btn" data-n="6">6</button>
      <button class="preset-btn" data-n="10">10</button>
    </div>
  </div>

  <!-- LANCER -->
  <button class="roll-btn" id="rollBtn">⚄ Lancer les dés</button>

  <!-- RÉSULTATS -->
  <div class="card results-card">
    <div class="results-header">
      <div class="results-left">
        <div class="card-title" style="margin:0">⚄ Résultats</div>
        <div class="results-actions" id="resultsActions" style="display:none">
          <button class="action-btn" id="holdAllBtn">🔒 Tout garder</button>
          <button class="action-btn release" id="releaseAllBtn" style="display:none">🔓 Tout relâcher</button>
        </div>
      </div>
      <div class="total-display">
        <div class="total-label">Total</div>
        <div class="total-value" id="totalDisplay">—</div>
      </div>
    </div>

    <div class="hold-hint" id="holdHint" style="display:none">
      Cliquez sur un dé pour le <strong>garder</strong> au prochain lancer
    </div>

    <div class="dice-grid" id="diceGrid">
      <div class="empty-state">Aucun lancer pour l'instant…</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="card" id="statsCard" style="display:none">
    <div class="card-title">📊 Statistiques</div>
    <div class="stats-row">
      <div class="stat-chip"><span class="val" id="statMin">—</span><span class="lbl">Min</span></div>
      <div class="stat-chip"><span class="val" id="statMax">—</span><span class="lbl">Max</span></div>
      <div class="stat-chip"><span class="val" id="statAvg">—</span><span class="lbl">Moyenne</span></div>
      <div class="stat-chip"><span class="val" id="statSum">—</span><span class="lbl">Somme</span></div>
    </div>
  </div>

  <!-- HISTORIQUE -->
  <div class="card" id="historyCard" style="display:none">
    <div class="results-header" style="margin-bottom:0.8rem">
      <div class="card-title" style="margin:0">📜 Historique</div>
      <button class="clear-btn" id="clearBtn">Effacer</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</main>

<script>
  /* ═══════════════════════════════════════
     CONSTANTES
  ═══════════════════════════════════════ */
  const DICE = [
    { faces: 4,   icon: '◆', label: 'D4'  },
    { faces: 6,   icon: '⬡', label: 'D6'  },
    { faces: 8,   icon: '◈', label: 'D8'  },
    { faces: 10,  icon: '◉', label: 'D10' },
    { faces: 12,  icon: '⬟', label: 'D12' },
    { faces: 20,  icon: '◎', label: 'D20' },
    { faces: 100, icon: '❋', label: 'D%'  },
  ];

  /* ═══════════════════════════════════════
     STATE
     heldMask[i] = true  → le dé i est gardé
  ═══════════════════════════════════════ */
  const state = {
    selectedDie: 1,   // D6 par défaut
    count: 5,         // 5 dés par défaut (Yam's !)
    lastRoll: [],     // valeurs du dernier lancer
    heldMask: [],     // booléens parallèles à lastRoll
    history: [],
    rolling: false,
    hasRolled: false,
  };

  /* ═══════════════════════════════════════
     DOM REFS
  ═══════════════════════════════════════ */
  const $ = id => document.getElementById(id);
  const dieTypesEl    = $('dieTypes');
  const countDisplay  = $('countDisplay');
  const diceGrid      = $('diceGrid');
  const totalDisplay  = $('totalDisplay');
  const historyList   = $('historyList');
  const statsCard     = $('statsCard');
  const historyCard   = $('historyCard');
  const holdHint      = $('holdHint');
  const resultsActions= $('resultsActions');
  const holdAllBtn    = $('holdAllBtn');
  const releaseAllBtn = $('releaseAllBtn');
  const rollBtnEl     = $('rollBtn');

  /* ═══════════════════════════════════════
     TYPE DE DÉ
  ═══════════════════════════════════════ */
  DICE.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'die-btn' + (i === state.selectedDie ? ' active' : '');
    btn.innerHTML = `<span class="die-icon">${d.icon}</span><span class="die-label">${d.label}</span>`;
    btn.addEventListener('click', () => {
      state.selectedDie = i;
      // Changer de dé annule les gardes en cours
      if (state.hasRolled) releaseAll();
      document.querySelectorAll('.die-btn').forEach((b, j) =>
        b.classList.toggle('active', j === i)
      );
    });
    dieTypesEl.appendChild(btn);
  });

  /* ═══════════════════════════════════════
     NOMBRE DE DÉS
  ═══════════════════════════════════════ */
  $('incBtn').addEventListener('click', () => setCount(state.count + 1));
  $('decBtn').addEventListener('click', () => setCount(state.count - 1));
  document.querySelectorAll('.preset-btn').forEach(b =>
    b.addEventListener('click', () => setCount(+b.dataset.n))
  );

  function setCount(n) {
    n = Math.max(1, Math.min(20, n));
    // Adapter heldMask à la nouvelle taille
    while (state.heldMask.length < n) state.heldMask.push(false);
    state.heldMask.length = n;
    state.count = n;
    countDisplay.textContent = n;
  }

  /* ═══════════════════════════════════════
     HOLD — clic sur un dé individuel
  ═══════════════════════════════════════ */
  function toggleHold(i) {
    if (!state.hasRolled) return;
    state.heldMask[i] = !state.heldMask[i];

    const el = diceGrid.children[i];
    if (!el) return;

    el.classList.toggle('held', state.heldMask[i]);

    if (state.heldMask[i]) {
      el.classList.add('just-held');
      setTimeout(() => el.classList.remove('just-held'), 350);
    }

    syncHoldUI();
  }

  function holdAll() {
    state.heldMask.fill(true);
    Array.from(diceGrid.children).forEach(el => el.classList.add('held'));
    syncHoldUI();
  }

  function releaseAll() {
    state.heldMask.fill(false);
    Array.from(diceGrid.children).forEach(el => el.classList.remove('held'));
    syncHoldUI();
  }

  holdAllBtn.addEventListener('click', holdAll);
  releaseAllBtn.addEventListener('click', releaseAll);

  /* Met à jour le hint, les boutons et le label du Roll */
  function syncHoldUI() {
    const heldN = state.heldMask.filter(Boolean).length;
    const total = state.lastRoll.length;
    const anyHeld = heldN > 0;
    const allHeld = heldN === total;

    holdAllBtn.style.display    = allHeld  ? 'none' : '';
    releaseAllBtn.style.display = anyHeld  ? ''     : 'none';

    if (anyHeld) {
      holdHint.textContent = `🔒 ${heldN} dé${heldN > 1 ? 's' : ''} gardé${heldN > 1 ? 's' : ''} · ${total - heldN} seront relancé${total - heldN !== 1 ? 's' : ''}`;
      holdHint.classList.add('has-held');
      rollBtnEl.innerHTML = `⚄ Relancer<span class="btn-held-badge">${total - heldN} dé${total - heldN !== 1 ? 's' : ''}</span>`;
    } else {
      holdHint.textContent = 'Cliquez sur un dé pour le garder au prochain lancer';
      holdHint.classList.remove('has-held');
      rollBtnEl.textContent = '⚄ Lancer les dés';
    }
  }

  /* ═══════════════════════════════════════
     ROLL
  ═══════════════════════════════════════ */
  rollBtnEl.addEventListener('click', roll);

  document.addEventListener('keydown', e => {
    if ((e.code === 'Space' || e.code === 'Enter') && document.activeElement === document.body) {
      e.preventDefault();
      roll();
    }
  });

  function roll() {
    if (state.rolling) return;
    state.rolling = true;

    const die = DICE[state.selectedDie];
    rollBtnEl.classList.add('rolling');

    // Snapshot du masque avant le lancer
    const prevHeld = [...state.heldMask];

    // Aligner les tableaux si le count a changé depuis le dernier lancer
    while (prevHeld.length < state.count) prevHeld.push(false);

    // Nouveaux résultats : garder les dés lockés, relancer les autres
    const newResults = Array.from({ length: state.count }, (_, i) =>
      (prevHeld[i] && state.lastRoll[i] !== undefined)
        ? state.lastRoll[i]
        : Math.floor(Math.random() * die.faces) + 1
    );

    const heldCount = prevHeld.slice(0, state.count).filter(Boolean).length;

    state.lastRoll = newResults;
    // Réinitialiser le masque : l'utilisateur repartira de zéro pour choisir
    state.heldMask = Array(state.count).fill(false);
    state.hasRolled = true;

    const total = newResults.reduce((a, b) => a + b, 0);

    state.history.unshift({ desc: `${state.count}${die.label}`, results: newResults, total, heldCount });
    if (state.history.length > 10) state.history.pop();

    spawnParticles(rollBtnEl);

    setTimeout(() => {
      renderDice(newResults, die.faces, prevHeld);
      renderTotal(total);
      renderStats(newResults);
      renderHistory();

      // Afficher les contrôles de hold
      holdHint.style.display    = '';
      resultsActions.style.display = '';
      holdAllBtn.style.display    = '';
      releaseAllBtn.style.display = 'none';
      holdHint.textContent = 'Cliquez sur un dé pour le garder au prochain lancer';
      holdHint.classList.remove('has-held');
      rollBtnEl.textContent = '⚄ Lancer les dés';

      rollBtnEl.classList.remove('rolling');
      state.rolling = false;
    }, 250);
  }

  /* ═══════════════════════════════════════
     RENDER — dés
  ═══════════════════════════════════════ */
  function renderDice(results, faces, prevHeld) {
    diceGrid.innerHTML = '';
    const minVal = Math.min(...results);

    results.forEach((val, i) => {
      const wasHeld = prevHeld[i] === true;

      const el = document.createElement('div');
      el.className = 'die-result';
      el.innerHTML = `<span class="die-val">${val}</span><span class="lock-icon">🔒</span>`;
      el.title = 'Cliquer pour garder / relâcher';

      if (val === faces)                              el.classList.add('is-max');
      else if (val === minVal && results.length > 1)  el.classList.add('is-min');

      el.addEventListener('click', () => toggleHold(i));
      diceGrid.appendChild(el);

      // Animation : les dés gardés apparaissent immédiatement, les autres rebondissent
      if (wasHeld) {
        el.style.opacity   = '1';
        el.style.transform = 'scale(1) rotate(0deg)';
        el.style.transition = 'border-color 0.2s, box-shadow 0.2s, background 0.2s';
      } else {
        setTimeout(() => el.classList.add('reveal'), i * 55);
      }
    });
  }

  /* ═══════════════════════════════════════
     RENDER — total, stats, history
  ═══════════════════════════════════════ */
  function renderTotal(total) {
    totalDisplay.classList.remove('new-roll');
    void totalDisplay.offsetWidth;
    totalDisplay.textContent = total;
    totalDisplay.classList.add('new-roll');
  }

  function renderStats(results) {
    statsCard.style.display = '';
    $('statMin').textContent = Math.min(...results);
    $('statMax').textContent = Math.max(...results);
    $('statAvg').textContent = (results.reduce((a,b)=>a+b,0) / results.length).toFixed(1);
    $('statSum').textContent = results.reduce((a,b)=>a+b,0);
  }

  function renderHistory() {
    historyCard.style.display = '';
    historyList.innerHTML = '';
    state.history.forEach(h => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const badge = h.heldCount > 0
        ? `<span class="held-badge">🔒${h.heldCount}</span>` : '';
      item.innerHTML = `
        <span class="history-desc">${h.desc}${badge} → [${h.results.join(', ')}]</span>
        <span class="history-total">${h.total}</span>
      `;
      historyList.appendChild(item);
    });
  }

  $('clearBtn').addEventListener('click', () => {
    state.history = [];
    historyCard.style.display = 'none';
  });

  /* ═══════════════════════════════════════
     PARTICLES FX
  ═══════════════════════════════════════ */
  function spawnParticles(btn) {
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const symbols = ['⚄','⚅','⚃','⚂','⚁','⚀','◆','◈'];

    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[i % symbols.length];
      const angle = (i / 8) * Math.PI * 2;
      const dist  = 80 + Math.random() * 60;
      p.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        --dx: ${Math.cos(angle) * dist}px;
        --dy: ${Math.sin(angle) * dist}px;
        --dr: ${(Math.random() - 0.5) * 360}deg;
        animation-delay: ${i * 30}ms;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  }

  /* ═══════════════════════════════════════
     ROLL BTN GLOW ON HOVER
  ═══════════════════════════════════════ */
  rollBtnEl.addEventListener('mousemove', e => {
    const r = rollBtnEl.getBoundingClientRect();
    rollBtnEl.style.setProperty('--mx', ((e.clientX - r.left) / r.width  * 100) + '%');
    rollBtnEl.style.setProperty('--my', ((e.clientY - r.top)  / r.height * 100) + '%');
  });
</script>
</body>
</html>
